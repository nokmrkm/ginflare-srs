// SM-2
function sm2Update(card, correct) {
  const q = correct ? 5 : 1;
  if (q < 3) { card.repetitions = 0; card.interval = 1; }
  else {
    if (card.repetitions === 0) card.interval = 1;
    else if (card.repetitions === 1) card.interval = 3;
    else card.interval = Math.round(card.interval * card.easeFactor);
    card.repetitions++;
  }
  card.easeFactor = Math.max(1.3, card.easeFactor + 0.1 - (5-q)*(0.08+(5-q)*0.02));
  const d = new Date(); d.setDate(d.getDate()+card.interval);
  card.dueDate = d.toISOString().slice(0,10);
  return card;
}
const todayStr = () => new Date().toISOString().slice(0,10);
const isNew = c => c.repetitions===0 && !c.dueDate;
const isDue = c => !c.dueDate || c.dueDate<=todayStr();
const blank = () => ({interval:1,repetitions:0,easeFactor:2.5,dueDate:null});
 
function getMeanings(str) {
  return str.split(/(?=\s*\((?:動|名|形|副|代|接|前)\))/)
    .map(s=>s.replace(/^\s*\((?:動|名|形|副|代|接|前)\)\s*/,"").split(/[、，,]/).map(t=>t.trim()).filter(Boolean))
    .flat().filter(Boolean);
}
function getPOSSections(str) {
  const posMap={"(動)":"動詞","(名)":"名詞","(形)":"形容詞","(副)":"副詞","(代)":"代名詞","(接)":"接続詞","(前)":"前置詞"};
  const colorMap={"動詞":"#60a5fa","名詞":"#4ade80","形容詞":"#e8c547","副詞":"#a78bfa","代名詞":"#fb923c","接続詞":"#f472b6","前置詞":"#34d399"};
  return str.split(/(?=\s*\((?:動|名|形|副|代|接|前)\))/).map(p=>{
    const m=p.match(/^\s*\((動|名|形|副|代|接|前)\)\s*(.*)/s);
    if(!m) return null;
    const label=posMap[`(${m[1]})`]||m[1];
    return {pos:label,color:colorMap[label]||"#a7a9be",meanings:m[2].split(/[、，,]/).map(t=>t.trim()).filter(Boolean)};
  }).filter(Boolean);
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function speak(text) {
  const u=new SpeechSynthesisUtterance(text); u.lang="en-US";
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}
 
const C={bg:"#0f0e17",surface:"#1a1929",surface2:"#232236",border:"#2e2c4a",
  accent:"#e8c547",correct:"#4ade80",wrong:"#ff6b6b",blue:"#60a5fa",muted:"#a7a9be",text:"#fffffe"};
const LSKEY="ginflare_v5";
const LSKEY_CUSTOM="ginflare_custom_words";
 
function App() {
  const [cards,setCards]=useState(()=>{try{return JSON.parse(localStorage.getItem(LSKEY)||"{}");}catch{return {};}});
  const [customWords,setCustomWords]=useState(()=>{try{return JSON.parse(localStorage.getItem(LSKEY_CUSTOM)||"[]");}catch{return [];}});
  const [tab,setTab]=useState("study");
  const [addForm,setAddForm]=useState({en:"",meaning:"",exEn:"",exJa:""});
  const [addErr,setAddErr]=useState("");
  const [csvMsg,setCsvMsg]=useState("");
  const [phase,setPhase]=useState("dash");
  const [queue,setQueue]=useState([]);
  const [cur,setCur]=useState(null);
  const [opts,setOpts]=useState([]);
  const [corrSet,setCorrSet]=useState([]);
  const [picked,setPicked]=useState(null);
  const [ok,setOk]=useState(null);
  const [sCorr,setSCorr]=useState(0);
  const [sTotal,setSTotal]=useState(0);
  const [cdwn,setCdwn]=useState(0);
  const timerRef=useRef(null);
  const qRef=useRef([]);
 
  const save = (c) => { try{localStorage.setItem(LSKEY,JSON.stringify(c));}catch{} };
  const saveCustom = (cw) => { try{localStorage.setItem(LSKEY_CUSTOM,JSON.stringify(cw));}catch{} };
  const ALL_WORDS = [...WORDS, ...customWords];
  const getCard = en => cards[en]||blank();
  const dueList=ALL_WORDS.filter(w=>isDue(getCard(w[0])));
  const newCount=ALL_WORDS.filter(w=>isNew(getCard(w[0]))).length;
  const learnedCnt=ALL_WORDS.filter(w=>!isNew(getCard(w[0]))).length;
 
  function buildQ(word) {
    const meanings=getMeanings(word[1]);
    const correct=meanings[Math.floor(Math.random()*meanings.length)];
    const distractors=shuffle(ALL_WORDS.filter(w=>w[0]!==word[0]).flatMap(w=>getMeanings(w[1])).filter(t=>!meanings.includes(t))).slice(0,3);
    return {opts:shuffle([correct,...distractors]),corrSet:meanings};
  }
  function startSession() {
    const q=shuffle([...shuffle(dueList.filter(w=>isNew(getCard(w[0])))).slice(0,20),...shuffle(dueList.filter(w=>!isNew(getCard(w[0]))))]);
    qRef.current=q; setSCorr(0); setSTotal(0); loadNext(q,cards); setPhase("quiz");
  }
  function loadNext(q,currentCards) {
    clearInterval(timerRef.current);
    if(q.length===0){setPhase("done");return;}
    const word=q[0]; const {opts:o,corrSet:cs}=buildQ(word);
    setCur(word); setOpts(o); setCorrSet(cs); setPicked(null); setOk(null); setCdwn(0); setQueue(q);
  }
  function handleAnswer(ans) {
    if(ok!==null) return;
    const correct=corrSet.includes(ans);
    setPicked(ans); setOk(correct); setSTotal(p=>p+1);
    if(correct){setSCorr(p=>p+1); speak(cur[0]);}
    const updated={...cards,[cur[0]]:sm2Update({...getCard(cur[0])},correct)};
    setCards(updated); save(updated);
    let t=1.8; setCdwn(t);
    timerRef.current=setInterval(()=>{
      t=parseFloat((t-0.1).toFixed(1)); setCdwn(Math.max(0,t));
      if(t<=0){clearInterval(timerRef.current); const next=qRef.current.slice(1); qRef.current=next; loadNext(next,updated);}
    },100);
  }
 
  const forecast=Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i); const ds=d.toISOString().slice(0,10);
    return {label:i===0?"今日":i===1?"明日":`${i}日後`,count:ALL_WORDS.filter(w=>(cards[w[0]]?.dueDate||"")===ds).length};
  });
  const fMax=Math.max(...forecast.map(d=>d.count),1);
  const totalInSession=sTotal+queue.length+(ok!==null?0:1);
  const pct=totalInSession>0?Math.round(sTotal/totalInSession*100):0;
 
  return (
    <div style={{fontFamily:"'Noto Sans JP',sans-serif",background:C.bg,minHeight:"100vh",display:"flex",justifyContent:"center",padding:"20px 16px",backgroundImage:"radial-gradient(ellipse at 20% 50%,#1e1b4b33 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#31288133 0%,transparent 60%)"}}>
      <div style={{width:"100%",maxWidth:540}}>
        <div style={{textAlign:"center",marginBottom:18,paddingTop:6}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:"1.75rem",color:C.accent,fontWeight:700}}>英単語学習</div>
          <div style={{fontSize:".72rem",color:C.muted,marginTop:3}}>忘却曲線に沿って最適タイミングで復習</div>
        </div>
        <div style={{display:"flex",gap:4,background:C.surface,borderRadius:12,padding:4,marginBottom:16}}>
          {[["study","📚 学習"],["list","📋 単語帳"],["settings","⚙️ 設定"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 4px",border:"none",borderRadius:8,fontFamily:"inherit",fontSize:".78rem",fontWeight:700,cursor:"pointer",background:tab===k?C.accent:"transparent",color:tab===k?C.bg:C.muted,transition:"all .2s"}}>{l}</button>
          ))}
        </div>
 
        {tab==="study" && <>
          {phase==="dash" && <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
              {[[dueList.length,"今日の復習",C.accent],[newCount,"新規単語",C.blue],[learnedCnt,"学習済み",C.correct]].map(([n,l,c])=>(
                <div key={l} style={{background:C.surface,borderRadius:14,padding:"14px 8px",textAlign:"center"}}>
                  <div style={{fontFamily:"Georgia,serif",fontSize:"1.9rem",color:c}}>{n}</div>
                  <div style={{fontSize:".66rem",color:C.muted,marginTop:3}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
              <button onClick={startSession} disabled={dueList.length===0}
                style={{width:"100%",padding:14,border:"none",borderRadius:12,fontFamily:"inherit",fontSize:".95rem",fontWeight:700,cursor:dueList.length>0?"pointer":"not-allowed",background:dueList.length>0?C.accent:C.surface2,color:dueList.length>0?C.bg:C.muted,opacity:dueList.length===0?.5:1}}>
                {dueList.length>0?`📖 今日の学習を開始（${dueList.length}問）`:"✅ 今日の分は完了！"}
              </button>
              {dueList.length===0&&<div style={{textAlign:"center",marginTop:10,fontSize:".76rem",color:C.muted}}>次の復習は明日以降です 🌙</div>}
            </div>
            <div style={{background:C.surface,borderRadius:16,padding:20}}>
              <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>今後7日間の予定</div>
              <div style={{display:"flex",gap:4,alignItems:"flex-end"}}>
                {forecast.map(({label,count})=>(
                  <div key={label} style={{flex:1,textAlign:"center"}}>
                    <div style={{height:60,display:"flex",alignItems:"flex-end",justifyContent:"center",background:C.surface2,borderRadius:"6px 6px 0 0"}}>
                      <div style={{width:"70%",height:Math.max(4,count/fMax*56),background:count>0?C.accent:"#2e2c4a",borderRadius:"4px 4px 0 0",transition:"height .4s"}}/>
                    </div>
                    <div style={{fontSize:".6rem",color:C.muted,marginTop:4}}>{label}</div>
                    <div style={{fontSize:".7rem",fontWeight:700,color:count>0?C.accent:C.muted}}>{count}</div>
                  </div>
                ))}
              </div>
            </div>
          </>}
 
          {phase==="quiz"&&cur&&<>
            <div style={{background:C.surface2,borderRadius:99,height:6,overflow:"hidden",marginBottom:6}}>
              <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${C.accent},#f5a623)`,borderRadius:99,transition:"width .4s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:".7rem",color:C.muted,marginBottom:14}}>
              <span style={{fontSize:".62rem",padding:"2px 8px",borderRadius:99,fontWeight:700,background:isNew(getCard(cur[0]))?"#60a5fa22":"#e8c54722",color:isNew(getCard(cur[0]))?C.blue:C.accent}}>
                {isNew(getCard(cur[0]))?"NEW":"復習"}
              </span>
              <span>{sTotal+1} / {totalInSession}問　残り <strong style={{color:C.text}}>{queue.length}</strong></span>
            </div>
            <div style={{background:C.surface,borderRadius:16,padding:"20px 20px 18px",marginBottom:12,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${C.accent},transparent)`}}/>
              <div onClick={()=>speak(cur[0])} style={{fontFamily:"Georgia,serif",fontSize:"2rem",color:C.text,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,lineHeight:1.2,marginBottom:4}}>
                {cur[0]} <span style={{fontSize:".9rem",opacity:.45}}>🔊</span>
              </div>
              {ok!==null&&(
                <div style={{marginTop:14,borderTop:`1px solid ${C.border}`,paddingTop:14}}>
                  <div style={{marginBottom:12}}>
                    {getPOSSections(cur[1]).map(({pos,color,meanings})=>(
                      <div key={pos} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6}}>
                        <span style={{fontSize:".62rem",padding:"2px 7px",borderRadius:99,fontWeight:700,background:color+"22",color,whiteSpace:"nowrap",marginTop:2}}>{pos}</span>
                        <span style={{fontSize:".84rem",color:C.text,lineHeight:1.6}}>{meanings.join("、")}</span>
                      </div>
                    ))}
                  </div>
                  <div onClick={()=>speak(cur[2])} style={{fontSize:".84rem",color:C.text,fontStyle:"italic",cursor:"pointer",marginBottom:5,padding:"8px 12px",background:C.surface2,borderRadius:8}}>
                    🔊 {cur[2]}
                  </div>
                  <div style={{fontSize:".78rem",color:C.muted,paddingLeft:4}}>{cur[3]}</div>
                </div>
              )}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
              {opts.map(o=>{
                let bg=C.surface2,border=`1.5px solid ${C.border}`,color=C.text,opacity=1,fw=400;
                if(ok!==null){
                  if(corrSet.includes(o)){bg=C.correct+"22";border=`1.5px solid ${C.correct}`;color=C.correct;fw=700;}
                  else if(o===picked){bg=C.wrong+"22";border=`1.5px solid ${C.wrong}`;color=C.wrong;}
                  else{opacity=0.3;}
                }
                return(<button key={o} onClick={()=>handleAnswer(o)} disabled={ok!==null} style={{padding:"13px 18px",border,borderRadius:12,cursor:ok!==null?"default":"pointer",fontFamily:"inherit",fontSize:".88rem",background:bg,color,textAlign:"left",opacity,fontWeight:fw,transition:"all .15s"}}>{o}</button>);
              })}
            </div>
            {ok!==null&&(
              <div style={{textAlign:"center",padding:"10px 14px",borderRadius:10,background:ok?C.correct+"22":C.wrong+"22",color:ok?C.correct:C.wrong,fontWeight:700,fontSize:".88rem"}}>
                {ok?"✅ 正解！":`❌ 正解：${corrSet[0]}`}
                <div style={{fontSize:".7rem",opacity:.7,marginTop:4}}>{cdwn>0?`${cdwn.toFixed(1)}秒後に次の問題…`:"読み込み中…"}</div>
              </div>
            )}
          </>}
 
          {phase==="done"&&(
            <div style={{background:C.surface,borderRadius:16,padding:"36px 24px",textAlign:"center"}}>
              <div style={{fontSize:"3rem",marginBottom:12}}>{sTotal>0&&sCorr/sTotal>=.8?"🎉":sTotal>0&&sCorr/sTotal>=.5?"💪":"📖"}</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:"1.7rem",color:C.accent,marginBottom:8}}>{sTotal>0&&sCorr/sTotal>=.8?"素晴らしい！":sTotal>0&&sCorr/sTotal>=.5?"いい調子！":"もう一度！"}</div>
              <div style={{color:C.muted,fontSize:".88rem",marginBottom:20}}>セッション完了</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
                {[[sCorr,"正解数"],[sTotal,"出題数"],[sTotal>0?Math.round(sCorr/sTotal*100)+"%":"—","正答率"],[learnedCnt,"学習済み合計"]].map(([n,l])=>(
                  <div key={l} style={{background:C.surface2,borderRadius:12,padding:14}}>
                    <div style={{fontFamily:"Georgia,serif",fontSize:"1.8rem",color:C.accent}}>{n}</div>
                    <div style={{fontSize:".7rem",color:C.muted,marginTop:2}}>{l}</div>
                  </div>
                ))}
              </div>
              <button onClick={()=>setPhase("dash")} style={{width:"100%",padding:14,border:"none",borderRadius:12,background:C.accent,color:C.bg,fontFamily:"inherit",fontSize:".95rem",fontWeight:700,cursor:"pointer"}}>ダッシュボードへ</button>
            </div>
          )}
        </>}
 
        {tab==="list"&&(
          <div style={{background:C.surface,borderRadius:16,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:".8rem"}}>
              <thead><tr>{["#","単語","意味（一部）","次回"].map(h=>(<th key={h} style={{textAlign:"left",padding:"10px",color:C.muted,fontWeight:700,fontSize:".66rem",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>{h}</th>))}</tr></thead>
              <tbody>
                {ALL_WORDS.map((w,i)=>{
                  const c=cards[w[0]]||blank(); const _new=isNew(c),_due=isDue(c)&&!_new;
                  return(<tr key={w[0]}>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid #1e1c30",color:C.muted,fontSize:".68rem"}}>{i+1}</td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid #1e1c30",fontWeight:700,fontFamily:"Georgia,serif"}}>{w[0]}</td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid #1e1c30",color:C.muted,fontSize:".76rem"}}>{getMeanings(w[1])[0]}</td>
                    <td style={{padding:"8px 10px",borderBottom:"1px solid #1e1c30"}}>
                      {_new?<span style={{fontSize:".6rem",padding:"2px 6px",borderRadius:99,background:"#60a5fa22",color:C.blue,fontWeight:700}}>NEW</span>
                        :_due?<span style={{fontSize:".6rem",padding:"2px 6px",borderRadius:99,background:"#e8c54733",color:C.accent,fontWeight:700}}>今日</span>
                        :<span style={{fontSize:".6rem",padding:"2px 6px",borderRadius:99,background:C.surface2,color:C.muted}}>{c.dueDate}</span>}
                    </td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        )}
 
        {tab==="settings"&&<>
          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>📂 CSVで一括インポート</div>
            <div style={{fontSize:".78rem",color:C.muted,lineHeight:1.7,marginBottom:12}}>
              1行目はヘッダー（スキップされます）。<br/>
              列順: <strong style={{color:C.text}}>英単語, 意味, 例文(英), 例文(日)</strong>
            </div>
            <label style={{display:"block",padding:"12px 16px",border:`1.5px dashed ${C.border}`,borderRadius:12,textAlign:"center",cursor:"pointer",background:C.surface2,color:C.muted,fontSize:".84rem"}}>
              📁 CSVファイルを選択
              <input type="file" accept=".csv" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  const lines=ev.target.result.replace(/\r/g,"").split("\n").filter(l=>l.trim());
                  const rows=lines.slice(1); // skip header
                  let added=0, skipped=0;
                  const current=[...customWords];
                  rows.forEach(line=>{
                    const cols=line.split(",").map(s=>s.trim());
                    if(cols.length<2||!cols[0]) return;
                    const word=cols[0].toLowerCase();
                    if(ALL_WORDS.some(w=>w[0]===word)||current.some(w=>w[0]===word)){skipped++;return;}
                    current.push([word, cols[1]||"", cols[2]||`${word}.`, cols[3]||"―"]);
                    added++;
                  });
                  setCustomWords(current); saveCustom(current);
                  setCsvMsg(`✅ ${added}語を追加しました${skipped>0?`（${skipped}語はスキップ）`:""}`);
                  setTimeout(()=>setCsvMsg(""),4000);
                };
                reader.readAsText(file,"UTF-8");
                e.target.value="";
              }}/>
            </label>
            {csvMsg&&<div style={{marginTop:10,fontSize:".78rem",color:C.correct,fontWeight:700}}>{csvMsg}</div>}
          </div>
 
          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:14}}>➕ 単語を追加</div>
            {[
              ["英単語","例: persist","en"],
              ["意味（品詞付き）","例: (動)持続する、固執する","meaning"],
              ["例文（英語）","例: Persist in your efforts.","exEn"],
              ["例文（日本語）","例: 努力を続けなさい。","exJa"],
            ].map(([label,placeholder,key])=>(
              <div key={key} style={{marginBottom:10}}>
                <div style={{fontSize:".7rem",color:C.muted,marginBottom:4}}>{label}</div>
                <input
                  value={addForm[key]}
                  onChange={e=>setAddForm(f=>({...f,[key]:e.target.value}))}
                  placeholder={placeholder}
                  style={{width:"100%",padding:"10px 12px",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontFamily:"inherit",fontSize:".84rem",outline:"none"}}
                />
              </div>
            ))}
            {addErr&&<div style={{fontSize:".75rem",color:C.wrong,marginBottom:8}}>{addErr}</div>}
            <button onClick={()=>{
              const {en,meaning,exEn,exJa}=addForm;
              if(!en.trim()){setAddErr("英単語を入力してください");return;}
              if(!meaning.trim()){setAddErr("意味を入力してください");return;}
              const word=en.trim().toLowerCase();
              if(ALL_WORDS.some(w=>w[0]===word)){setAddErr(`「${word}」はすでに登録されています`);return;}
              const newWord=[word, meaning.trim(), exEn.trim()||`${word}.`, exJa.trim()||"―"];
              const updated=[...customWords,newWord];
              setCustomWords(updated); saveCustom(updated);
              setAddForm({en:"",meaning:"",exEn:"",exJa:""}); setAddErr("");
            }} style={{width:"100%",padding:12,border:"none",borderRadius:10,background:C.accent,color:C.bg,fontFamily:"inherit",fontSize:".88rem",fontWeight:700,cursor:"pointer"}}>
              追加する
            </button>
          </div>
 
          {customWords.length>0&&(
            <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
              <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>📝 追加した単語（{customWords.length}語）</div>
              {customWords.map((w,i)=>(
                <div key={w[0]} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<customWords.length-1?`1px solid ${C.border}`:"none"}}>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"Georgia,serif",fontWeight:700,color:C.text,fontSize:".9rem"}}>{w[0]}</div>
                    <div style={{fontSize:".72rem",color:C.muted,marginTop:2}}>{w[1]}</div>
                  </div>
                  <button onClick={()=>{
                    if(!confirm(`「${w[0]}」を削除しますか？`))return;
                    const updated=customWords.filter((_,j)=>j!==i);
                    setCustomWords(updated); saveCustom(updated);
                  }} style={{padding:"4px 10px",border:`1px solid ${C.wrong}`,borderRadius:8,background:"transparent",color:C.wrong,fontFamily:"inherit",fontSize:".72rem",cursor:"pointer"}}>削除</button>
                </div>
              ))}
            </div>
          )}
 
          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>統計</div>
            <div style={{fontSize:".84rem",color:C.muted}}>登録単語数: <strong style={{color:C.text}}>{ALL_WORDS.length}語</strong>（銀フレ{WORDS.length}語 + カスタム{customWords.length}語）</div>
            <div style={{fontSize:".84rem",color:C.muted,marginTop:6}}>学習済み: <strong style={{color:C.text}}>{learnedCnt}語</strong></div>
          </div>
          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:14}}>📱 iPhoneにアプリとして追加</div>
            {[["1","SafariでこのページのURLを開く","ChromeではNG"],["2","画面下部の共有ボタンをタップ","□から↑が出ているアイコン"],["3","「ホーム画面に追加」を選ぶ","リストをスクロールして探す"],["4","「追加」をタップ","完了！アイコンが追加されます"]].map(([n,t,s])=>(
              <div key={n} style={{display:"flex",gap:12,marginBottom:12,alignItems:"flex-start"}}>
                <div style={{background:C.accent,color:C.bg,borderRadius:99,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:".75rem",flexShrink:0,marginTop:1}}>{n}</div>
                <div><div style={{fontSize:".84rem",color:C.text,fontWeight:700,marginBottom:2}}>{t}</div><div style={{fontSize:".72rem",color:C.muted}}>{s}</div></div>
              </div>
            ))}
            <div style={{fontSize:".72rem",color:C.muted,padding:"10px 12px",background:C.surface2,borderRadius:8,lineHeight:1.6}}>
              💡 ホーム画面から起動するとlocalStorageにデータが保存され、次回以降も引き継がれます。
            </div>
          </div>
          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:10}}>SM-2アルゴリズム</div>
            <div style={{fontSize:".8rem",color:C.muted,lineHeight:1.8}}>Ankiと同じ<strong style={{color:C.text}}>SuperMemo SM-2</strong>を採用。<br/>正解 → 間隔が伸びる（1日 → 3日 → 1週間…）<br/>不正解 → 間隔リセット</div>
          </div>
          <button onClick={()=>{if(confirm("学習履歴をリセットしますか？")){const empty={};setCards(empty);save(empty);setPhase("dash");}}}
            style={{width:"100%",padding:14,border:`1px solid ${C.wrong}`,borderRadius:12,background:"transparent",color:C.wrong,fontFamily:"inherit",fontSize:".9rem",fontWeight:700,cursor:"pointer"}}>
            🗑️ 学習データをリセット
          </button>
        </>}
 
      </div>
    </div>
  );
}
 
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
