// SM-2
function sm2Update(card, q) {
  // q: 1=知らなかった 2=難しい 4=普通 5=簡単 (or boolean→converted)
  if(typeof q==="boolean") q=q?5:1;
  if (q < 3) { card.repetitions = 0; card.interval = 1; }
  else {
    if (card.repetitions === 0) card.interval = 1;
    else if (card.repetitions === 1) card.interval = 3;
    else card.interval = Math.round(card.interval * card.easeFactor);
    card.repetitions++;
  }
  card.easeFactor = Math.max(1.3, card.easeFactor + 0.1 - (5-q)*(0.08+(5-q)*0.02));
  const d = new Date(); d.setDate(d.getDate()+card.interval);
  card.dueDate = d.toISOString().slice(0,10);
  return card;
}
const todayStr = () => new Date().toISOString().slice(0,10);
const isNew = c => c.repetitions===0 && !c.dueDate;
const isDue = c => !c.dueDate || c.dueDate<=todayStr();
const blank = () => ({interval:1,repetitions:0,easeFactor:2.5,dueDate:null});

function getMeanings(str) {
  return str.split(/(?=\s*\((?:動|名|形|副|代|接|前)\))/)
    .map(s=>s.replace(/^\s*\((?:動|名|形|副|代|接|前)\)\s*/,"").split(/[、，,]/).map(t=>t.trim()).filter(Boolean))
    .flat().filter(Boolean);
}
function getPOSSections(str) {
  const posMap={"(動)":"動詞","(名)":"名詞","(形)":"形容詞","(副)":"副詞","(代)":"代名詞","(接)":"接続詞","(前)":"前置詞"};
  const colorMap={"動詞":"#60a5fa","名詞":"#4ade80","形容詞":"#e8c547","副詞":"#a78bfa","代名詞":"#fb923c","接続詞":"#f472b6","前置詞":"#34d399"};
  return str.split(/(?=\s*\((?:動|名|形|副|代|接|前)\))/).map(p=>{
    const m=p.match(/^\s*\((動|名|形|副|代|接|前)\)\s*(.*)/s);
    if(!m) return null;
    const label=posMap[`(${m[1]})`]||m[1];
    return {pos:label,color:colorMap[label]||"#a7a9be",meanings:m[2].split(/[、，,]/).map(t=>t.trim()).filter(Boolean)};
  }).filter(Boolean);
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function speak(text) {
  const u=new SpeechSynthesisUtterance(text); u.lang="en-US";
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

const C={bg:"#0f0e17",surface:"#1a1929",surface2:"#232236",border:"#2e2c4a",
  accent:"#e8c547",correct:"#4ade80",wrong:"#ff6b6b",blue:"#60a5fa",muted:"#a7a9be",text:"#fffffe"};
const LSKEY="ginflare_v5";
const LSKEY_CUSTOM="ginflare_custom_words";

function App() {
  const [cards,setCards]=useState(()=>{try{return JSON.parse(localStorage.getItem(LSKEY)||"{}");}catch{return {};}});
  const [customWords,setCustomWords]=useState(()=>{try{return JSON.parse(localStorage.getItem(LSKEY_CUSTOM)||"[]");}catch{return [];}});
  const [deletedBuiltins,setDeletedBuiltins]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("ginflare_deleted")||"[]"));}catch{return new Set();}});
  const [editedBuiltins,setEditedBuiltins]=useState(()=>{try{return JSON.parse(localStorage.getItem("ginflare_edits")||"{}");}catch{return {};}});
  const [studyDates,setStudyDates]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("ginflare_dates")||"[]"));}catch{return new Set();}});
  const [editingWord,setEditingWord]=useState(null);
  const [editForm,setEditForm]=useState({en:"",meaning:"",exEn:"",exJa:""});
  const [confirmBulk,setConfirmBulk]=useState(false);
  const [tab,setTab]=useState("study");
  const [addForm,setAddForm]=useState({en:"",meaning:"",exEn:"",exJa:""});
  const [addErr,setAddErr]=useState("");
  const [csvMsg,setCsvMsg]=useState("");
  const [phase,setPhase]=useState("dash");
  const [practiceMode,setPracticeMode]=useState(false);
  const [practiceConfig,setPracticeConfig]=useState({range:"all",count:"all",format:"choice"});
  const [quizFormat,setQuizFormat]=useState(()=>localStorage.getItem("ginflare_format")||"choice");
  const [cardFlipped,setCardFlipped]=useState(false);
  const [queue,setQueue]=useState([]);
  const [cur,setCur]=useState(null);
  const [opts,setOpts]=useState([]);
  const [corrSet,setCorrSet]=useState([]);
  const [picked,setPicked]=useState(null);
  const [ok,setOk]=useState(null);
  const [sCorr,setSCorr]=useState(0);
  const [sTotal,setSTotal]=useState(0);
  const [cdwn,setCdwn]=useState(0);
  const timerRef=useRef(null);
  const qRef=useRef([]);

  const save = (c) => { try{localStorage.setItem(LSKEY,JSON.stringify(c));}catch{} };
  const saveCustom = (cw) => { try{localStorage.setItem(LSKEY_CUSTOM,JSON.stringify(cw));}catch{} };
  const saveFormat = (f) => { try{localStorage.setItem("ginflare_format",f);}catch{} };
  const saveDeleted = (s) => { try{localStorage.setItem("ginflare_deleted",JSON.stringify([...s]));}catch{} };
  const saveEdited = (e) => { try{localStorage.setItem("ginflare_edits",JSON.stringify(e));}catch{} };
  const saveStudyDate = () => {
    const today=todayStr();
    if(!studyDates.has(today)){const ns=new Set(studyDates);ns.add(today);setStudyDates(ns);try{localStorage.setItem("ginflare_dates",JSON.stringify([...ns]));}catch{}}
  };
  const EFFECTIVE_WORDS = WORDS.filter(w=>!deletedBuiltins.has(w[0])).map(w=>editedBuiltins[w[0]]||w);
  const ALL_WORDS = [...EFFECTIVE_WORDS, ...customWords];
  function getStreak() {
    let s=0; const today=new Date();
    for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(studyDates.has(d.toISOString().slice(0,10)))s++;else if(i>0)break;}
    return s;
  }
  const streak=getStreak();
  const stampEmoji=(n)=>n>=30?"💎":n>=14?"⭐":n>=7?"🔥":n>=3?"🌸":n>=1?"🌿":"🌱";
  const getCard = en => cards[en]||blank();
  const dueList=ALL_WORDS.filter(w=>isDue(getCard(w[0])));
  const newCount=ALL_WORDS.filter(w=>isNew(getCard(w[0]))).length;
  const learnedCnt=ALL_WORDS.filter(w=>!isNew(getCard(w[0]))).length;

  function buildQ(word) {
    const meanings=getMeanings(word[1]);
    const correct=meanings[Math.floor(Math.random()*meanings.length)];
    const distractors=shuffle(ALL_WORDS.filter(w=>w[0]!==word[0]).flatMap(w=>getMeanings(w[1])).filter(t=>!meanings.includes(t))).slice(0,3);
    return {opts:shuffle([correct,...distractors]),corrSet:meanings};
  }
  function startSession() {
    const q=shuffle([...shuffle(dueList.filter(w=>isNew(getCard(w[0])))).slice(0,20),...shuffle(dueList.filter(w=>!isNew(getCard(w[0]))))]);
    qRef.current=q; setSCorr(0); setSTotal(0); setPracticeMode(false); loadNext(q,cards); setPhase("quiz");
  }
  function startPractice(cfg) {
    const {range,count}=cfg;
    let pool=range==="all"?ALL_WORDS:range==="due"?dueList:ALL_WORDS.filter(w=>isNew(getCard(w[0])));
    pool=shuffle(pool);
    if(count!=="all") pool=pool.slice(0,parseInt(count));
    qRef.current=pool; setSCorr(0); setSTotal(0); setPracticeMode(true); loadNext(pool,cards); setPhase("quiz");
  }
  // currentFormat allows passing format at call time (for practice mode overrides)
  const activeFormat = practiceConfig.format && practiceMode ? practiceConfig.format : quizFormat;
  function loadNext(q,currentCards) {
    clearInterval(timerRef.current);
    if(q.length===0){setPhase("done");saveStudyDate();return;}
    const word=q[0]; const {opts:o,corrSet:cs}=buildQ(word);
    setCur(word); setOpts(o); setCorrSet(cs); setPicked(null); setOk(null); setCdwn(0); setCardFlipped(false); setQueue(q);
  }
  function handleAnswer(ans) {
    if(ok!==null) return;
    const correct=corrSet.includes(ans);
    setPicked(ans); setOk(correct); setSTotal(p=>p+1);
    if(correct){setSCorr(p=>p+1); speak(cur[0]);}
    let updated=cards;
    if(!practiceMode){
      updated={...cards,[cur[0]]:sm2Update({...getCard(cur[0])},correct?5:1)};
      setCards(updated); save(updated);
    }
    let t=1.8; setCdwn(t);
    timerRef.current=setInterval(()=>{
      t=parseFloat((t-0.1).toFixed(1)); setCdwn(Math.max(0,t));
      if(t<=0){clearInterval(timerRef.current); const next=qRef.current.slice(1); qRef.current=next; loadNext(next,updated);}
    },100);
  }
  function handleFlash(q) {
    // q: 1=知らなかった 2=難しい 4=普通 5=簡単
    const correct=q>=4;
    setSTotal(p=>p+1);
    if(correct){setSCorr(p=>p+1); speak(cur[0]);}
    let updated=cards;
    if(!practiceMode){
      updated={...cards,[cur[0]]:sm2Update({...getCard(cur[0])},q)};
      setCards(updated); save(updated);
    }
    const next=qRef.current.slice(1); qRef.current=next; loadNext(next,updated);
  }

  const forecast=Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i); const ds=d.toISOString().slice(0,10);
    return {label:i===0?"今日":i===1?"明日":`${i}日後`,count:ALL_WORDS.filter(w=>(cards[w[0]]?.dueDate||"")===ds).length};
  });
  const fMax=Math.max(...forecast.map(d=>d.count),1);
  const totalInSession=sTotal+queue.length+(ok!==null?0:1);
  const pct=totalInSession>0?Math.round(sTotal/totalInSession*100):0;

  return (
    <div style={{fontFamily:"'Noto Sans JP',sans-serif",background:C.bg,minHeight:"100vh",display:"flex",justifyContent:"center",padding:"20px 16px",backgroundImage:"radial-gradient(ellipse at 20% 50%,#1e1b4b33 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#31288133 0%,transparent 60%)"}}>
      <div style={{width:"100%",maxWidth:540}}>
        <div style={{textAlign:"center",marginBottom:18,paddingTop:6}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:"1.75rem",color:C.accent,fontWeight:700}}>英単語学習</div>
          <div style={{fontSize:".72rem",color:C.muted,marginTop:3}}>忘却曲線に沿って最適タイミングで復習</div>
        </div>
        <div style={{display:"flex",gap:4,background:C.surface,borderRadius:12,padding:4,marginBottom:16}}>
          {[["study","📚 学習"],["list","📋 単語帳"],["settings","⚙️ 設定"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 4px",border:"none",borderRadius:8,fontFamily:"inherit",fontSize:".78rem",fontWeight:700,cursor:"pointer",background:tab===k?C.accent:"transparent",color:tab===k?C.bg:C.muted,transition:"all .2s"}}>{l}</button>
          ))}
        </div>

        {tab==="study" && <>
          {phase==="dash" && <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
              {[[dueList.length,"今日の復習",C.accent],[newCount,"新規単語",C.blue],[learnedCnt,"学習済み",C.correct]].map(([n,l,c])=>(
                <div key={l} style={{background:C.surface,borderRadius:14,padding:"14px 8px",textAlign:"center"}}>
                  <div style={{fontFamily:"Georgia,serif",fontSize:"1.9rem",color:c}}>{n}</div>
                  <div style={{fontSize:".66rem",color:C.muted,marginTop:3}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
              <button onClick={startSession} disabled={dueList.length===0}
                style={{width:"100%",padding:14,border:"none",borderRadius:12,fontFamily:"inherit",fontSize:".95rem",fontWeight:700,cursor:dueList.length>0?"pointer":"not-allowed",background:dueList.length>0?(quizFormat==="flash"?"#a78bfa":C.accent):C.surface2,color:dueList.length>0?C.bg:C.muted,opacity:dueList.length===0?.5:1,marginBottom:8}}>
                {dueList.length>0

                  {ALL_WORDS.map((w,i)=>{
                    const c=cards[w[0]]||blank(); const _new=isNew(c),_due=isDue(c)&&!_new;
                    const isCustom=customWords.some(x=>x[0]===w[0]);
                    return(<tr key={w[0]}>
                      <td style={{padding:"8px 10px",borderBottom:"1px solid #1e1c30",color:C.muted,fontSize:".66rem"}}>{i+1}</td>
                      <td style={{padding:"8px 10px",borderBottom:"1px solid #1e1c30",fontWeight:700,fontFamily:"Georgia,serif"}}>
                        {w[0]}
                        {isCustom&&<span style={{marginLeft:5,fontSize:".55rem",padding:"1px 5px",borderRadius:99,background:"#60a5fa22",color:C.blue}}>追加</span>}
                      </td>
                      <td style={{padding:"8px 10px",borderBottom:"1px solid #1e1c30",color:C.muted,fontSize:".74rem"}}>{getMeanings(w[1])[0]}</td>
                      <td style={{padding:"8px 10px",borderBottom:"1px solid #1e1c30"}}>
                        {_new?<span style={{fontSize:".58rem",padding:"2px 6px",borderRadius:99,background:"#60a5fa22",color:C.blue,fontWeight:700}}>NEW</span>
                          :_due?<span style={{fontSize:".58rem",padding:"2px 6px",borderRadius:99,background:"#e8c54733",color:C.accent,fontWeight:700}}>今日</span>
                          :<span style={{fontSize:".58rem",padding:"2px 6px",borderRadius:99,background:C.surface2,color:C.muted}}>{c.dueDate}</span>}
                      </td>
                      <td style={{padding:"6px 8px",borderBottom:"1px solid #1e1c30",whiteSpace:"nowrap"}}>
                        <button onClick={()=>{setEditingWord(w[0]);setEditForm({en:w[0],meaning:w[1],exEn:w[2],exJa:w[3]});window.scrollTo(0,0);}}
                          style={{padding:"4px 8px",border:`1px solid ${C.border}`,borderRadius:6,background:"transparent",color:C.muted,fontFamily:"inherit",fontSize:".7rem",cursor:"pointer",marginRight:4}}>✏️</button>
                        <button onClick={()=>{
                          if(isCustom){const u=customWords.filter(x=>x[0]!==w[0]);setCustomWords(u);saveCustom(u);}
                          else{const ns=new Set(deletedBuiltins);ns.add(w[0]);setDeletedBuiltins(ns);saveDeleted(ns);}
                        }} style={{padding:"4px 8px",border:`1px solid ${C.wrong}44`,borderRadius:6,background:"transparent",color:C.wrong,fontFamily:"inherit",fontSize:".7rem",cursor:"pointer"}}>🗑️</button>
                      </td>
                    </tr>);
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {tab==="settings"&&<>
          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>📂 CSVで一括インポート</div>
            <div style={{fontSize:".78rem",color:C.muted,lineHeight:1.7,marginBottom:12}}>
              1行目はヘッダー（スキップされます）。<br/>
              列順: <strong style={{color:C.text}}>英単語, 意味, 例文(英), 例文(日)</strong>
            </div>
            <label style={{display:"block",padding:"12px 16px",border:`1.5px dashed ${C.border}`,borderRadius:12,textAlign:"center",cursor:"pointer",background:C.surface2,color:C.muted,fontSize:".84rem"}}>
              📁 CSVファイルを選択
              <input type="file" accept=".csv" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  const lines=ev.target.result.replace(/\r/g,"").split("\n").filter(l=>l.trim());
                  const rows=lines.slice(1); // skip header
                  let added=0, skipped=0;
                  const current=[...customWords];
                  rows.forEach(line=>{
                    const cols=line.split(",").map(s=>s.trim());
                    if(cols.length<2||!cols[0]) return;
                    const word=cols[0].toLowerCase();
                    if(ALL_WORDS.some(w=>w[0]===word)||current.some(w=>w[0]===word)){skipped++;return;}
                    current.push([word, cols[1]||"", cols[2]||`${word}.`, cols[3]||"―"]);
                    added++;
                  });
                  setCustomWords(current); saveCustom(current);
                  setCsvMsg(`✅ ${added}語を追加しました${skipped>0?`（${skipped}語はスキップ）`:""}`);
                  setTimeout(()=>setCsvMsg(""),4000);
                };
                reader.readAsText(file,"UTF-8");
                e.target.value="";
              }}/>
            </label>
            {csvMsg&&<div style={{marginTop:10,fontSize:".78rem",color:C.correct,fontWeight:700}}>{csvMsg}</div>}
          </div>

          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:14}}>➕ 単語を追加</div>
            {[
              ["英単語","例: persist","en"],
              ["意味（品詞付き）","例: (動)持続する、固執する","meaning"],
              ["例文（英語）","例: Persist in your efforts.","exEn"],
              ["例文（日本語）","例: 努力を続けなさい。","exJa"],
            ].map(([label,placeholder,key])=>(
              <div key={key} style={{marginBottom:10}}>
                <div style={{fontSize:".7rem",color:C.muted,marginBottom:4}}>{label}</div>
                <input
                  value={addForm[key]}
                  onChange={e=>setAddForm(f=>({...f,[key]:e.target.value}))}
                  placeholder={placeholder}
                  style={{width:"100%",padding:"10px 12px",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontFamily:"inherit",fontSize:".84rem",outline:"none"}}
                />
              </div>
            ))}
            {addErr&&<div style={{fontSize:".75rem",color:C.wrong,marginBottom:8}}>{addErr}</div>}
            <button onClick={()=>{
              const {en,meaning,exEn,exJa}=addForm;
              if(!en.trim()){setAddErr("英単語を入力してください");return;}
              if(!meaning.trim()){setAddErr("意味を入力してください");return;}
              const word=en.trim().toLowerCase();
              if(ALL_WORDS.some(w=>w[0]===word)){setAddErr(`「${word}」はすでに登録されています`);return;}
              const newWord=[word, meaning.trim(), exEn.trim()||`${word}.`, exJa.trim()||"―"];
              const updated=[...customWords,newWord];
              setCustomWords(updated); saveCustom(updated);
              setAddForm({en:"",meaning:"",exEn:"",exJa:""}); setAddErr("");
            }} style={{width:"100%",padding:12,border:"none",borderRadius:10,background:C.accent,color:C.bg,fontFamily:"inherit",fontSize:".88rem",fontWeight:700,cursor:"pointer"}}>
              追加する
            </button>
          </div>

          {customWords.length>0&&(
            <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
              <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>統計</div>
              <div style={{fontSize:".84rem",color:C.muted}}>登録単語数: <strong style={{color:C.text}}>{ALL_WORDS.length}語</strong>（銀フレ{EFFECTIVE_WORDS.length}語 + カスタム{customWords.length}語）</div>
              <div style={{fontSize:".84rem",color:C.muted,marginTop:6}}>学習済み: <strong style={{color:C.text}}>{learnedCnt}語</strong></div>
            </div>
          )}
          {customWords.length===0&&(
            <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
              <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>統計</div>
              <div style={{fontSize:".84rem",color:C.muted}}>登録単語数: <strong style={{color:C.text}}>{ALL_WORDS.length}語</strong>（銀フレ{EFFECTIVE_WORDS.length}語）</div>
              <div style={{fontSize:".84rem",color:C.muted,marginTop:6}}>学習済み: <strong style={{color:C.text}}>{learnedCnt}語</strong></div>
            </div>
          )}

          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".7rem",fontWeight:700,color:C.muted,letterSpacing:".08em",textTransform:"uppercase",marginBottom:10}}>通常学習の形式</div>
            <div style={{display:"flex",gap:8}}>
              {[["choice","📝 4択"],["flash","🃏 フラッシュカード"]].map(([val,label])=>(
                <button key={val} onClick={()=>{setQuizFormat(val);saveFormat(val);}}
                  style={{flex:1,padding:"10px 8px",border:`1.5px solid ${quizFormat===val?"#a78bfa":C.border}`,borderRadius:10,fontFamily:"inherit",fontSize:".8rem",fontWeight:700,background:quizFormat===val?"#a78bfa18":"transparent",color:quizFormat===val?"#a78bfa":C.muted,cursor:"pointer"}}>
                  {label}
                </button>
              ))}
            </div>
            <div style={{fontSize:".7rem",color:C.muted,marginTop:8,lineHeight:1.6}}>
              {quizFormat==="choice"?"4択：テンポよく大量に。初見・周回向き。":"フラッシュカード：自力で思い出してSM-2に4段階評価。長期定着向き。"}
            </div>
          </div>
          <div style={{background:C.surface,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:".66rem",fontWeight:700,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:10}}>SM-2アルゴリズム</div>
            <div style={{fontSize:".8rem",color:C.muted,lineHeight:1.8}}>Ankiと同じ<strong style={{color:C.text}}>SuperMemo SM-2</strong>を採用。<br/>正解 → 間隔が伸びる（1日 → 3日 → 1週間…）<br/>不正解 → 間隔リセット</div>
          </div>
          <button onClick={()=>{if(confirm("学習履歴をリセットしますか？")){const empty={};setCards(empty);save(empty);setPhase("dash");}}}
            style={{width:"100%",padding:14,border:`1px solid ${C.wrong}`,borderRadius:12,background:"transparent",color:C.wrong,fontFamily:"inherit",fontSize:".9rem",fontWeight:700,cursor:"pointer"}}>
            🗑️ 学習データをリセット
          </button>
        </>}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
